<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artículo - La República en Debate</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .articulo-completo {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .articulo-completo h1 {
      font-size: 2rem;
      color: var(--azul-oscuro);
      margin-bottom: 15px;
      line-height: 1.3;
    }

    .articulo-completo .meta {
      display: flex;
      gap: 20px;
      color: #999;
      font-size: 0.9rem;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--celeste);
    }

    .articulo-completo img {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 30px;
    }

    .articulo-completo .categoria-badge {
      display: inline-block;
      background: var(--celeste);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
    }

    .articulo-contenido {
      font-size: 1.05rem;
      line-height: 1.9;
      color: #333;
    }

    .articulo-contenido p {
      margin-bottom: 20px;
    }

    .btn-volver {
      display: inline-block;
      margin: 40px 0;
      padding: 10px 20px;
      background: var(--azul-oscuro);
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }

    .btn-volver:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <div class="escarapela"></div>
      <div class="header-titulo">
        <h1>La República en Debate</h1>
        <p>Opinión, política y ciudadanía argentina</p>
      </div>
      <div class="escarapela"></div>
    </div>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="index.html#newsletter">Newsletter</a>
      <a href="admin.html">Administración</a>
    </nav>
  </header>

  <div class="articulo-completo">
    <a href="index.html" class="btn-volver">← Volver al inicio</a>
    <div id="articulo-contenido">
      <p style="color:#999;">Cargando artículo...</p>
    </div>
  </div>

  <footer>
    <p>© 2026 La República en Debate · Todos los derechos reservados</p>
  </footer>

  <script>
    const API = 'https://la-republica-en-debate.onrender.com/api';

    async function cargarArticulo() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) {
        window.location.href = 'index.html';
        return;
      }

      try {
        const res = await fetch(`${API}/articulos/${id}`);
        const a = await res.json();

        const fecha = new Date(a.fechaCreacion).toLocaleDateString('es-AR', {
          day: 'numeric', month: 'long', year: 'numeric'
        });

        document.title = `${a.titulo} - La República en Debate`;

        document.getElementById('articulo-contenido').innerHTML = `
          <span class="categoria-badge">${a.categoria}</span>
          <h1>${a.titulo}</h1>
          <div class="meta">
            <span>✍️ ${a.autor}</span>
            <span>📅 ${fecha}</span>
          </div>
          ${a.imagen ? `<img src="${a.imagen}" alt="${a.titulo}">` : ''}
          <div class="articulo-contenido">${a.contenido.replace(/\n/g, '<br>')}</div>
        `;
      } catch (err) {
        document.getElementById('articulo-contenido').innerHTML =
          '<p>Error al cargar el artículo.</p>';
      }
    }

    cargarArticulo();
  </script>

</body>
</html>
